# Linux web server role profile.
PROFILE_ID=web-server
PROFILE_NAME=Linux web server
PROFILE_DESCRIPTION=HTTP/HTTPS-facing host profile for Apache, nginx or similar services.
RUN_HOST_INVENTORY=true
RUN_MONITORING=true
RUN_LOGGING=true
RUN_FIM=true
RUN_BACKUP_REVIEW=false
RUN_DATABASE_INVENTORY=false
DISK_PATHS=/|/var|/var/log|/var/www
EXPECTED_SERVICES=nginx.service|apache2.service|httpd.service
FIM_PATHS=/etc/hosts|/etc/resolv.conf|/etc/fstab|/etc/nginx|/etc/apache2|/etc/httpd
BACKUP_PATHS=
NOTES=Service checks are expectations; inactive services are findings when this role was selected intentionally.
