# Linux database server role profile.
PROFILE_ID=database-server
PROFILE_NAME=Linux database server
PROFILE_DESCRIPTION=Database host profile for MariaDB/MySQL and PostgreSQL style systems.
RUN_HOST_INVENTORY=true
RUN_MONITORING=true
RUN_LOGGING=true
RUN_FIM=true
RUN_BACKUP_REVIEW=false
RUN_DATABASE_INVENTORY=true
DISK_PATHS=/|/var|/var/lib|/var/log
EXPECTED_SERVICES=mariadb.service|mysql.service|postgresql.service
FIM_PATHS=/etc/hosts|/etc/resolv.conf|/etc/fstab|/etc/mysql|/etc/postgresql|/etc/my.cnf
BACKUP_PATHS=
NOTES=Database inventory is read-only and does not log in to databases.
