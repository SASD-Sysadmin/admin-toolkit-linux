# Linux backup host role profile.
PROFILE_ID=backup-host
PROFILE_NAME=Linux backup host
PROFILE_DESCRIPTION=Host role profile for systems expected to store or orchestrate backups.
RUN_HOST_INVENTORY=true
RUN_MONITORING=true
RUN_LOGGING=true
RUN_FIM=true
RUN_BACKUP_REVIEW=true
RUN_DATABASE_INVENTORY=false
DISK_PATHS=/|/backup|/srv/backup|/mnt/backup
EXPECTED_SERVICES=cron.service
FIM_PATHS=/etc/hosts|/etc/resolv.conf|/etc/fstab|/etc/cron.d|/etc/cron.daily|/etc/systemd/system
BACKUP_PATHS=/backup|/srv/backup|/mnt/backup
NOTES=Backup paths are expectations; missing paths should trigger review rather than automatic creation.
