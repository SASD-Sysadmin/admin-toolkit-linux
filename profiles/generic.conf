# Generic Linux host role profile.
# Pipe-separated fields are parsed by scripts/reporting/sasd-run-profile-review.sh.
PROFILE_ID=generic
PROFILE_NAME=Generic Linux host
PROFILE_DESCRIPTION=Baseline review for an unknown or mixed-purpose Linux host.
RUN_HOST_INVENTORY=true
RUN_MONITORING=true
RUN_LOGGING=true
RUN_FIM=true
RUN_BACKUP_REVIEW=false
RUN_DATABASE_INVENTORY=false
DISK_PATHS=/
EXPECTED_SERVICES=
FIM_PATHS=/etc/hosts|/etc/resolv.conf|/etc/fstab
BACKUP_PATHS=
NOTES=Use this when no stronger host role is known yet.
