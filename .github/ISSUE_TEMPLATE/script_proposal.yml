name: Script proposal
description: Propose a new Linux administration script
title: "script: "
labels:
  - script
body:
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: What should the script help with?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - host documentation
        - security audit
        - logging
        - monitoring
        - backup
        - network
        - database
        - other
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety expectations
      options:
        - label: The script should be read-only by default.
          required: true
        - label: The script must not contain secrets or customer-specific data.
          required: true
