name: Bug report
description: Report a problem with an existing script or document
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide sanitized commands and output.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Debian 12, Ubuntu 24.04, etc.
