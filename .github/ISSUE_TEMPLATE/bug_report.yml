name: Bug report
description: Report a problem in an existing script or document
title: "bug: "
labels:
  - bug
body:
  - type: input
    id: affected-file
    attributes:
      label: Affected file
      placeholder: scripts/security/example.sh
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Distribution, version and shell if relevant.
